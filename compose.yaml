services:
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:${ELASTICSEARCH_VERSION:-9.4.3}
    container_name: mtrag-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - xpack.ml.enabled=true
      - xpack.ml.max_machine_memory_percent=40
      - path.repo=/snapshots
      - ES_JAVA_OPTS=-Xms${ELASTICSEARCH_HEAP:-2g} -Xmx${ELASTICSEARCH_HEAP:-2g}
    mem_limit: 7g
    ports:
      - "127.0.0.1:9200:9200"
    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data
      - ./artifacts/elasticsearch/snapshots:/snapshots:ro
    healthcheck:
      test: ["CMD-SHELL", "curl --silent --fail http://localhost:9200/_cluster/health >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 30
    restart: unless-stopped

volumes:
  elasticsearch-data:
